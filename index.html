<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sınav Yeri Sorgulama | Exam Location Inquiry</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.3.2/papaparse.min.js"></script>
    <style>
        body { 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
            display: flex; 
            justify-content: center; 
            align-items: flex-start;
            padding-top: 50px; 
            background: #f4f7f6; 
            margin: 0;
        }

        .container {
            background: #ffffff;
            padding: 40px;
            border-radius: 16px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.08);
            max-width: 450px;
            width: 90%;
            text-align: center;
        }

        h2 {
            font-weight: 700;
            color: #1a202c;
            margin-bottom: 25px;
            font-size: 1.5rem;
            line-height: 1.2;
        }

        .en-title {
            display: block;
            font-size: 1rem;
            color: #718096;
            font-weight: 400;
            margin-top: 5px;
        }

        label {
            display: block;
            text-align: left;
            font-size: 12px;
            font-weight: 700;
            color: #4a5568;
            margin-bottom: 8px;
            margin-left: 4px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .en-label {
            display: block;
            font-size: 11px;
            color: #a0aec0;
            font-weight: 500;
            text-transform: none;
        }

        select, input {
            width: 100%;
            padding: 14px 16px;
            margin-bottom: 20px;
            border: 2px solid #e2e8f0;
            border-radius: 10px;
            font-size: 15px;
            color: #4a5568;
            background-color: #f8fafc;
            transition: all 0.3s ease;
            outline: none;
            box-sizing: border-box;
        }

        select:focus, input:focus {
            border-color: #4299e1;
            background-color: #fff;
            box-shadow: 0 0 0 3px rgba(66, 153, 225, 0.15);
        }

        button {
            width: 100%;
            padding: 15px;
            background: linear-gradient(135deg, #3182ce 0%, #2b6cb0 100%);
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
            box-shadow: 0 4px 12px rgba(49, 130, 206, 0.3);
        }

        button:hover {
            transform: translateY(-1px);
            box-shadow: 0 6px 15px rgba(49, 130, 206, 0.4);
        }

        #result {
            margin-top: 25px;
            padding: 20px;
            border-radius: 12px;
            display: none;
            text-align: left;
            transition: all 0.3s ease;
        }

        .basarili {
            background: #ffffff;
            border-left: 6px solid #1a73e8;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
        }

        .hata {
            background: #fff5f5;
            border: 1px solid #feb2b2;
            color: #c53030;
            text-align: center;
            font-size: 14px;
        }
    </style>
</head>
<body>

<div class="container">
    <h2>Sınav Yeri Sorgulama<span class="en-title">Exam Location Inquiry</span></h2>
    
    <label for="courseSelect">
        SINAVINA GİRECEĞİNİZ TEMEL DERS
        <span class="en-label">SELECT YOUR EXAM SUBJECT</span>
    </label>
    <select id="courseSelect">
        <option value="" disabled selected>Ders seçimi yapınız / Select course...</option>
        <option value="matematik.csv">MAT1072 Matematik 2</option>
        <option value="lineer2.csv">MAT1320 Lineer Cebir</option>        
    </select>

    <label for="studentId">
        ÖĞRENCİ NUMARANIZ
        <span class="en-label">STUDENT ID NUMBER</span>
    </label>
    <input type="text" id="studentId" autocomplete="off">
    
    <button onclick="searchExam()">SORGULA / SEARCH</button>

    <div id="result"></div>
</div>

<script>
function searchExam() {
    const courseSelect = document.getElementById('courseSelect');
    const dersDosyasi = courseSelect.value;
    const dersAdi = courseSelect.options[courseSelect.selectedIndex].text;
    const no = document.getElementById('studentId').value.trim();
    const sonucDiv = document.getElementById('result');

    if (!dersDosyasi) { alert("Lütfen bir ders seçin / Please select a course"); return; }
    if (!no) { alert("Lütfen numaranızı girin / Please enter your student ID"); return; }

    const dosyaYolu = dersDosyasi + "?v=" + new Date().getTime();

    Papa.parse(dosyaYolu, {
        download: true,
        header: true,
        skipEmptyLines: true,
        encoding: "UTF-8",
        complete: function(results) {
            const liste = results.data;
            
            const temizListe = liste.map(item => {
                const yeniObj = {};
                for (let key in item) {
                    yeniObj[key.trim().replace(/^\uFEFF/, "")] = item[key];
                }
                return yeniObj;
            });

            // Sabit bilgileri (Tarih/Saat) ilk satırdan alıyoruz
            const genelBilgi = temizListe[0] || {};
            const sinavTarihi = genelBilgi.Tarih || '-';
            const sinavSaati = genelBilgi.Saat || '-';

            const student = temizListe.find(o => String(o.No).trim() === no);

            sonucDiv.style.display = "block";
            
            if (student) {
                sonucDiv.className = "basarili";
                const tamAd = `${student.Ad || ''} ${student.Soyad || ''}`;
                
                sonucDiv.innerHTML = `
                    <!-- Üst Bölüm: Hitap -->
                    <div style="text-align: center; border-bottom: 1px solid #eee; padding-bottom: 10px; margin-bottom: 15px;">
                        <span style="font-size: 1.1rem; color: #2c3e50;">Sayın / Dear</span><br>
                        <strong style="font-size: 1.4rem; color: #1a73e8; text-transform: uppercase;">${tamAd}</strong>
                    </div>

                    <!-- Orta Bölüm: Ders ve Zaman Bilgisi -->
                    <div style="margin-bottom: 15px; text-align: center; background: #f8fafc; padding: 10px; border-radius: 8px;">
                        <div style="margin-bottom: 8px;">
                            <small style="color: #7f8c8d; display: block; font-size: 10px;">DERS / COURSE</small>
                            <span style="font-weight: 700; color: #2d3748; font-size: 1.1rem;">${dersAdi}</span>
                        </div>
                        <div style="display: flex; justify-content: space-around; border-top: 1px solid #e2e8f0; pt: 8px; margin-top: 8px;">
                            <div>
                                <small style="color: #7f8c8d; display: block; font-size: 10px;">TARİH / DATE</small>
                                <span style="font-weight: 600; color: #2d3748;">${sinavTarihi}</span>
                            </div>
                            <div>
                                <small style="color: #7f8c8d; display: block; font-size: 10px;">SAAT / TIME</small>
                                <span style="font-weight: 600; color: #2d3748;">${sinavSaati}</span>
                            </div>
                        </div>
                    </div>

                    <!-- Alt Bölüm: Yer Bilgisi -->
                    <div style="margin-bottom: 15px;">
                        <small style="color: #7f8c8d; display: block; margin-bottom: 4px;">FAKÜLTE / FACULTY</small>
                        <span style="font-size: 1.1rem; font-weight: 600; color: #34495e;">${student.Fakulte || '-'}</span>
                    </div>

                    <div style="margin-bottom: 20px;">
                        <small style="color: #7f8c8d; display: block; margin-bottom: 4px;">SINAV SALONU / EXAM HALL</small>
                        <span style="font-size: 1.3rem; font-weight: 800; color: #e74c3c;">${student.Derslik || '-'}</span>
                    </div>

                    <!-- Uyarı Kısmı (Türkçe ve İngilizce Korundu) -->
                    <div style="border-top: 1px solid #edf2f7; pt: 15px; margin-top: 15px; color: #4a5568; font-size: 13px; line-height: 1.6;">
                        <div style="margin-bottom: 10px; padding: 10px; background: #fffaf0; border-radius: 8px; border-left: 4px solid #f6ad55;">
                            <p style="margin: 0; font-weight: 600; color: #7b341e;">HATIRLATMA / REMINDER:</p>
                            <p style="margin: 4px 0 0 0;">Sınav saatinden en az 15 dakika önce öğrenci kimliğinizle birlikte ilgili salonda hazır bulununuz.</p>
                            <p style="margin: 4px 0 0 0; color: #a0aec0; font-style: italic; font-size: 12px;">Please be present in the relevant hall at least 15 minutes before the exam with your student ID.</p>
                        </div>
                    </div>
                `;
            } else {
                sonucDiv.className = "hata";
                sonucDiv.innerHTML = `
                    <strong>Kayıt bulunamadı. / Record not found.</strong><br>
                    Lütfen numaranızı ve dersi kontrol ediniz.
                `;
            }
        },
        error: function() {
            alert("Dosya yüklenemedi / Failed to load file.");
        }
    });
}
</script>

</body>
</html>
