<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sınav Yeri Sorgulama | Exam Location Inquiry</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.3.2/papaparse.min.js"></script>
    <style>
        body { 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
            display: flex; 
            justify-content: center; 
            align-items: flex-start;
            padding-top: 50px; 
            background: #f4f7f6; 
            margin: 0;
        }

        .container {
            background: #ffffff;
            padding: 40px;
            border-radius: 16px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.08);
            max-width: 450px;
            width: 90%;
            text-align: center;
        }

        h2 {
            font-weight: 700;
            color: #1a202c;
            margin-bottom: 25px;
            font-size: 1.5rem;
            line-height: 1.2;
        }

        .en-title {
            display: block;
            font-size: 1rem;
            color: #718096;
            font-weight: 400;
            margin-top: 5px;
        }

        label {
            display: block;
            text-align: left;
            font-size: 12px;
            font-weight: 700;
            color: #4a5568;
            margin-bottom: 8px;
            margin-left: 4px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .en-label {
            display: block;
            font-size: 11px;
            color: #a0aec0;
            font-weight: 500;
            text-transform: none;
        }

        select, input {
            width: 100%;
            padding: 14px 16px;
            margin-bottom: 20px;
            border: 2px solid #e2e8f0;
            border-radius: 10px;
            font-size: 15px;
            color: #4a5568;
            background-color: #f8fafc;
            transition: all 0.3s ease;
            outline: none;
            box-sizing: border-box;
        }

        select:focus, input:focus {
            border-color: #4299e1;
            background-color: #fff;
            box-shadow: 0 0 0 3px rgba(66, 153, 225, 0.15);
        }

        button {
            width: 100%;
            padding: 15px;
            background: linear-gradient(135deg, #3182ce 0%, #2b6cb0 100%);
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
            box-shadow: 0 4px 12px rgba(49, 130, 206, 0.3);
        }

        button:hover {
            transform: translateY(-1px);
            box-shadow: 0 6px 15px rgba(49, 130, 206, 0.4);
        }

        #result {
            margin-top: 25px;
            padding: 20px;
            border-radius: 12px;
            display: none;
            text-align: left;
            transition: all 0.3s ease;
        }

        .basarili {
            background: #ffffff;
            border-left: 6px solid #1a73e8;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
        }

        .hata {
            background: #fff5f5;
            border: 1px solid #feb2b2;
            color: #c53030;
            text-align: center;
            font-size: 14px;
        }

/* Sonuç kutusunun genel animasyonu */
@keyframes slideUp {
    from { opacity: 0; transform: translateY(20px); }
    to { opacity: 1; transform: translateY(0); }
}

.basarili {
    background: #ffffff;
    border: none !important;
    border-radius: 20px !important;
    box-shadow: 0 15px 35px rgba(0,0,0,0.1) !important;
    animation: slideUp 0.4s ease-out;
    overflow: hidden;
    padding: 0 !important; /* İç padding'i elementlere dağıtacağız */
}
    </style>
</head>
<body>

<div class="container">
    <h2>Sınav Yeri Sorgulama<span class="en-title">Exam Location Inquiry</span></h2>
    
    <label for="courseSelect">
        SINAVINA GİRECEĞİNİZ TEMEL DERS
        <span class="en-label">SELECT YOUR EXAM SUBJECT</span>
    </label>
    <select id="courseSelect">
        <option value="" disabled selected>Ders seçimi yapınız / Select course...</option>
        <option value="matematik.csv">MAT1072 Matematik 2</option>
        <option value="lineer2.csv">MAT1320 Lineer Cebir</option>        
    </select>

    <label for="studentId">
        ÖĞRENCİ NUMARANIZ
        <span class="en-label">STUDENT ID NUMBER</span>
    </label>
    <input type="text" id="studentId" autocomplete="off">
    
    <button onclick="searchExam()">SORGULA / SEARCH</button>

    <div id="result"></div>
</div>

<script>
function searchExam() {
    const courseSelect = document.getElementById('courseSelect');
    const dersDosyasi = courseSelect.value;
    const dersAdi = courseSelect.options[courseSelect.selectedIndex].text;
    const no = document.getElementById('studentId').value.trim();
    const sonucDiv = document.getElementById('result');

    if (!dersDosyasi) { alert("Lütfen bir ders seçin / Please select a course"); return; }
    if (!no) { alert("Lütfen numaranızı girin / Please enter your student ID"); return; }

    const dosyaYolu = dersDosyasi + "?v=" + new Date().getTime();

    Papa.parse(dosyaYolu, {
        download: true,
        header: true,
        skipEmptyLines: true,
        encoding: "UTF-8",
        complete: function(results) {
            const liste = results.data;
            
            const temizListe = liste.map(item => {
                const yeniObj = {};
                for (let key in item) {
                    yeniObj[key.trim().replace(/^\uFEFF/, "")] = item[key];
                }
                return yeniObj;
            });

            // Sabit bilgileri (Tarih/Saat) ilk satırdan alıyoruz
            const genelBilgi = temizListe[0] || {};
            const sinavTarihi = genelBilgi.Tarih || '-';
            const sinavSaati = genelBilgi.Saat || '-';

            const student = temizListe.find(o => String(o.No).trim() === no);

            sonucDiv.style.display = "block";
            
            if (student) {
                sonucDiv.className = "basarili";
                const tamAd = `${student.Ad || ''} ${student.Soyad || ''}`;
                
                sonucDiv.innerHTML = `
    <!-- Üst Mavi Şerit: İsim ve Hitap -->
    <div style="background: linear-gradient(135deg, #3182ce 0%, #2b6cb0 100%); padding: 25px 20px; text-align: center; color: white;">
        <span style="font-size: 0.9rem; opacity: 0.9;">Sayın / Dear</span>
        <div style="font-size: 1.5rem; font-weight: 700; text-transform: uppercase; margin-top: 5px; letter-spacing: 0.5px;">${tamAd}</div>
    </div>

    <div style="padding: 20px;">
        <!-- Ders Bilgisi -->
        <div style="text-align: center; margin-bottom: 20px;">
            <div style="display: inline-block; background: #edf2f7; padding: 6px 15px; border-radius: 20px; color: #4a5568; font-weight: 600; font-size: 0.9rem;">
                📚 ${dersAdi}
            </div>
        </div>

        <!-- Zaman Kartları -->
        <div style="display: flex; gap: 10px; margin-bottom: 20px;">
            <div style="flex: 1; background: #f7fafc; padding: 12px; border-radius: 12px; text-align: center; border: 1px solid #e2e8f0;">
                <small style="color: #a0aec0; display: block; font-size: 10px; font-weight: 800;">TARİH / DATE</small>
                <span style="font-weight: 700; color: #2d3748;">📅 ${sinavTarihi}</span>
            </div>
            <div style="flex: 1; background: #f7fafc; padding: 12px; border-radius: 12px; text-align: center; border: 1px solid #e2e8f0;">
                <small style="color: #a0aec0; display: block; font-size: 10px; font-weight: 800;">SAAT / TIME</small>
                <span style="font-weight: 700; color: #2d3748;">🕒 ${sinavSaati}</span>
            </div>
        </div>

        <!-- Salon Bilgisi (En Dikkat Çekici Alan) -->
        <div style="background: #fff5f5; padding: 15px; border-radius: 12px; border: 1px dashed #feb2b2; text-align: center; margin-bottom: 20px;">
            <small style="color: #e53e3e; display: block; font-size: 11px; font-weight: 700; margin-bottom: 5px;">SINAV SALONU / EXAM HALL</small>
            <div style="font-size: 1.8rem; font-weight: 900; color: #c53030; letter-spacing: 1px;">${student.Derslik || '-'}</div>
            <small style="color: #718096; font-size: 0.9rem; font-weight: 600;">${student.Fakulte || '-'}</small>
        </div>

        <!-- Alt Uyarı Notu -->
        <div style="background: #fffaf0; padding: 12px; border-radius: 10px; border-left: 4px solid #ed8936;">
            <p style="margin: 0; font-size: 12px; color: #7b341e; line-height: 1.4;">
                <strong>HATIRLATMA:</strong> Sınavdan 15 dk. önce kimliğinizle salonda hazır olunuz.<br>
                <i style="color: #a0aec0;">Please be ready at the hall 15 min. before the exam with your ID.</i>
            </p>
        </div>
    </div>
`;
            } else {
                sonucDiv.className = "hata";
                sonucDiv.innerHTML = `
                    <strong>Kayıt bulunamadı. / Record not found.</strong><br>
                    Lütfen numaranızı ve dersi kontrol ediniz.
                `;
            }
        },
        error: function() {
            alert("Dosya yüklenemedi / Failed to load file.");
        }
    });
}
</script>

</body>
</html>
