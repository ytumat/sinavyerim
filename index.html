<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
<!-- Manifest bağlantısı -->
<link rel="manifest" href="manifest.json">

<!-- iOS (iPhone) için uygulama ikonu ve ayarları -->
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="MATyer">
<link rel="apple-touch-icon" href="icon.png">

<!-- Tema Rengi (Android üst bar rengi) -->
<meta name="theme-color" content="#3182ce">
    <title>Sınav Yeri Sorgulama | Exam Location Inquiry</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.3.2/papaparse.min.js"></script>
    <style>
        body { 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
            display: flex; 
            justify-content: center; 
            align-items: flex-start;
            padding-top: 30px;
            background: #f4f7f6; 
            margin: 0;
        }

        .container {
            background: #ffffff;
            padding: 20px 40px 40px 40px; /* Üst padding logonun kendi payı için azaltıldı */
            border-radius: 16px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.08);
            max-width: 450px;
            width: 90%;
            text-align: center;
        }

        /* Logo Alanı Tasarımı */
        .logo-kapsayici {
            margin-bottom: 25px;
            display: inline-block;
            text-align: center;
        }

        .logo-png {
            width: 60%; /*200px; Tasarımınıza göre bu değeri 300-350 arası değiştirebilirsiniz */
            max-width: 100%;
            height: auto;
            display: block;
            margin: 0 auto;
        }

        label {
            display: block;
            text-align: left;
            font-size: 11px; /* Biraz daha küçültülerek modern bir hava verildi */
            font-weight: 700;
            color: #4a5568;
            margin-bottom: 8px;
            margin-left: 4px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .en-label {
            display: block;
            font-size: 10px;
            color: #a0aec0;
            font-weight: 500;
            text-transform: none;
        }

        select, input {
            width: 100%;
            padding: 14px 16px;
            margin-bottom: 20px;
            border: 2px solid #e2e8f0;
            border-radius: 10px;
            font-size: 15px;
            color: #4a5568;
            background-color: #f8fafc;
            transition: all 0.3s ease;
            outline: none;
            box-sizing: border-box;
        }

        select:focus, input:focus {
            border-color: #3182ce;
            background-color: #fff;
            box-shadow: 0 0 0 3px rgba(66, 153, 225, 0.15);
        }

        button {
            width: 100%;
            padding: 15px;
            background: linear-gradient(135deg, #3182ce 0%, #2b6cb0 100%);
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
            box-shadow: 0 4px 12px rgba(49, 130, 206, 0.3);
            margin-top: 5px;
        }

        button:hover {
            transform: translateY(-1px);
            box-shadow: 0 6px 15px rgba(49, 130, 206, 0.4);
        }

        #result {
            margin-top: 25px;
            padding: 0; 
            border-radius: 20px;
            display: none;
            text-align: left;
            transition: all 0.3s ease;
            animation: slideUp 0.4s ease-out;
            overflow: hidden;
            box-shadow: 0 15px 35px rgba(0,0,0,0.1);
        }

        .basarili {
            background: #ffffff;
        }

        .hata {
            background: #fff5f5;
            border: 1px solid #feb2b2;
            color: #c53030;
            text-align: center;
            font-size: 14px;
            padding: 20px;
        }

        @keyframes slideUp {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }





label {
    display: block;
    text-align: left;
    font-size: 10.5px; /* Daha kompakt ve şık */
    font-weight: 800; /* Daha vurgulu */
    color: #2d3748; /* Biraz daha koyu, net okunur */
    margin-bottom: 10px;
    margin-left: 2px;
    text-transform: uppercase;
    letter-spacing: 1.2px; /* Harfler nefes alsın */
}

.en-label {
    display: block;
    font-size: 9.5px;
    color: #a0aec0;
    font-weight: 600;
    text-transform: uppercase; /* İngilizceyi de büyük yapıp inceltmek daha şık durur */
    letter-spacing: 0.8px;
    margin-top: 2px;
}

select, input {
    width: 100%;
    padding: 15px 18px;
    margin-bottom: 25px;
    border: 2px solid #edf2f7;
    border-radius: 12px;
    font-size: 14px;
    font-weight: 500; /* Yazılan numaralar daha tok dursun */
    color: #1a202c;
    background-color: #f8fafc;
    transition: all 0.2s ease-in-out;
    outline: none;
    box-sizing: border-box;
    font-family: 'Segoe UI', system-ui, sans-serif;
}

button {
    width: 100%;
    padding: 16px;
    background: linear-gradient(135deg, #2c5282 0%, #1a365d 100%); /* Daha derin bir mavi */
    color: white;
    border: none;
    border-radius: 12px;
    font-size: 14px;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 2px; /* Şık görünümün sırrı burada */
    cursor: pointer;
    transition: all 0.3s ease;
    box-shadow: 0 4px 12px rgba(26, 54, 93, 0.2);
}
    </style>
</head>
<body>

<div class="container">
    <!-- Yeni Eklenen Logo Alanı -->
    <div class="logo-kapsayici">
        <img src="logo.png" alt="MATyer Logo" class="logo-png">
    </div>
    
    <label for="courseSelect">
        SINAVINA GİRECEĞİNİZ TEMEL DERS
        <span class="en-label">SELECT YOUR EXAM SUBJECT</span>
    </label>
    <select id="courseSelect">
        <option value="" disabled selected>Ders seçimi yapınız / Select course...</option>
        <option value="matematik.csv">MAT1072 Matematik 2</option>
        <option value="matyer1.csv">MAT1320 Lineer Cebir</option>        
    </select>

    <label for="studentId">
        ÖĞRENCİ NUMARANIZ
        <span class="en-label">STUDENT ID NUMBER</span>
    </label>
    <input type="text" id="studentId" autocomplete="off">
    
    <button onclick="searchExam()">SORGULA / SEARCH</button>

    <div id="result"></div>
</div>

<script>
function searchExam() {
    const courseSelect = document.getElementById('courseSelect');
    const dersDosyasi = courseSelect.value;
    const no = document.getElementById('studentId').value.trim();
    const sonucDiv = document.getElementById('result');

    if (!dersDosyasi) { alert("Lütfen bir ders seçin / Please select a course"); return; }
    if (!no) { alert("Lütfen numaranızı girin / Please enter your student ID"); return; }

    const dosyaYolu = dersDosyasi + "?v=" + new Date().getTime();

    Papa.parse(dosyaYolu, {
        download: true,
        header: true,
        skipEmptyLines: true,
        encoding: "UTF-8",
        complete: function(results) {
            const liste = results.data;
            
            const temizListe = liste.map(item => {
                const yeniObj = {};
                for (let key in item) {
                    yeniObj[key.trim().replace(/^\uFEFF/, "")] = item[key];
                }
                return yeniObj;
            });

            const genelBilgi = temizListe[0] || {};
            const sinavTarihi = genelBilgi.Tarih || '-';
            const sinavSaati = genelBilgi.Saat || '-';

            const student = temizListe.find(o => String(o.No).trim() === no);

            sonucDiv.style.display = "block";
            
            if (student) {
                sonucDiv.className = "basarili";
                const tamAd = `${student.Ad || ''} ${student.Soyad || ''}`;
                const birlesikDersAdi = `${student.Kod || ''} ${student.Ders || ''}`.trim();
                
                sonucDiv.innerHTML = `
                    <div style="text-align: center; border-bottom: 1px solid #eee; padding: 20px 10px 10px 10px; margin-bottom: 20px;">
                        <span style="font-size: 1.1rem; color: #2c3e50;">Sayın / Dear</span><br>
                        <strong style="font-size: 1.4rem; color: #1a73e8; text-transform: uppercase;">${tamAd}</strong>
                    </div>

                    <div style="display: flex; justify-content: space-around; margin: 0 20px 20px 20px; padding: 10px; background: #f8fafc; border-radius: 8px;">
                        <div>
                            <small style="color: #7f8c8d; display: block; font-size: 10px; font-weight: bold;">TARİH / DATE</small>
                            <span style="font-weight: 600; color: #2d3748;">${sinavTarihi}</span>
                        </div>
                        <div style="border-left: 1px solid #e2e8f0;"></div>
                        <div>
                            <small style="color: #7f8c8d; display: block; font-size: 10px; font-weight: bold;">SAAT / TIME</small>
                            <span style="font-weight: 600; color: #2d3748;">${sinavSaati}</span>
                        </div>
                    </div>

                    <div style="margin: 0 20px 20px 20px; text-align: center;">
                        <small style="color: #7f8c8d; display: block; font-size: 11px; margin-bottom: 5px; font-weight: bold;">DERS / COURSE</small>
                        <div style="font-size: 1.1rem; font-weight: 700; color: #2d3748; margin-bottom: 15px; line-height: 1.3;">
                            ${birlesikDersAdi}
                        </div>

                        <div style="background: #fff5f5; padding: 20px; border-radius: 12px; border: 2px solid #feb2b2;">
    <!-- Fakülte Bölümü -->
    <small style="color: #e53e3e; display: block; font-size: 11px; font-weight: 800; margin-bottom: 2px; letter-spacing: 1px;">FAKÜLTE / FACULTY</small>                            
    <div style="font-size: 1rem; color: #4a5568; font-weight: 600; margin-bottom: 12px;">${student.Fakulte || '-'}</div> 
    
    <!-- Salon Bölümü -->
    <small style="color: #e53e3e; display: block; font-size: 11px; font-weight: 800; margin-bottom: 0px; letter-spacing: 1px;">SINAV SALONU / EXAM HALL</small>
    <div style="font-size: 2.2rem; font-weight: 900; color: #c53030; line-height: 1.1; margin-top: 5px;">${student.Derslik || '-'}</div>
</div>

                        </div>
                    </div>

                    <div style="border-top: 1px solid #edf2f7; padding: 15px 20px; color: #4a5568; font-size: 13px; line-height: 1.6;">
                        <div style="padding: 12px; background: #fffaf0; border-radius: 8px; border-left: 4px solid #f6ad55;">
                            <p style="margin: 0; font-weight: 600; color: #7b341e;">HATIRLATMA / REMINDER:</p>
                            <p style="margin: 4px 0 0 0;">Sınav saatinden en az 15 dakika önce öğrenci kimliğinizle birlikte ilgili salonda hazır bulununuz.</p>
                            <p style="margin: 4px 0 0 0; color: #a0aec0; font-style: italic; font-size: 12px;">Please be present in the relevant hall at least 15 minutes before the exam with your student ID.</p>
                        </div>
                    </div>
                `;
            } else {
                sonucDiv.className = "hata";
                sonucDiv.innerHTML = `<strong>Kayıt bulunamadı. / Record not found.</strong><br>Lütfen numaranızı ve dersi kontrol ediniz.`;
            }
        },
        error: function() {
            alert("Dosya yüklenemedi / Failed to load file.");
        }
    });
}
</script>

</body>
</html>
